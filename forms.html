<!-- Static copy of the form so Netlify detects it at deploy time. Not linked. -->
<form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="name"><input type="text" name="company">
  <input type="tel" name="phone"><input type="email" name="email">
  <select name="machines"><option>1–3 machines</option></select>
  <textarea name="message"></textarea><input name="bot-field">
</form>
